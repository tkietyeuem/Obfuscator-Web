<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lua Obfuscator</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false;">
    <div class="container">
        <header>
            <h1>Lua <span>Obfuscator</span></h1>
            <p>Advanced Script Protection System</p>
        </header>
        <div class="config-bar">
            <div>
                <select id="m">
                    <option value="1">Standard</option>
                    <option value="2">Flux VM</option>
                    <option value="3">Luraph Extreme</option>
                </select>
            </div>
            <div class="status-tag">STATUS: ENCRYPTION ACTIVE</div>
        </div>
        <div class="grid">
            <textarea id="i" spellcheck="false" placeholder="Paste Lua Script..."></textarea>
            <textarea id="o" spellcheck="false" placeholder="Encrypted Output..." readonly></textarea>
        </div>
        <div class="actions">
            <button class="btn-m" onclick="X()">Encrypt</button>
            <button class="btn-s" onclick="C()">Copy Result</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
